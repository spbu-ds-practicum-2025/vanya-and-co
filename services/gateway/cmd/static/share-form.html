<h2>Поделиться файлом</h2>

<form id="shareForm">
    <label>Имя файла (из вашего списка):</label><br>
    <select id="filename" name="filename" required>
        <option value="">Выберите файл</option>
    </select><br><br>

    <label>Срок действия (дни):</label><br>
    <select id="ttl" name="ttl">
        <option value="1">1 день</option>
        <option value="7" selected>7 дней</option>
        <option value="30">30 дней</option>
        <option value="0">Без срока</option>
    </select><br><br>

    <button type="submit">Создать ссылку</button>
</form>

<div id="result" style="margin-top: 20px; padding: 10px; background: #f0f0f0; display: none;">
    <h3>Ссылка создана:</h3>
    <p><strong>Ссылка:</strong> <a id="shareLink" href=""></a></p>
    <p><strong>Токен:</strong> <code id="shareToken"></code></p>
    <p><strong>Срок действия:</strong> <span id="expiry"></span></p>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Загружаем список файлов пользователя
    fetch('/files/list')
        .then(r => r.text())
        .then(html => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const rows = doc.querySelectorAll('table tr td:first-child');
            
            const select = document.getElementById('filename');
            rows.forEach(td => {
                const filename = td.textContent.trim();
                if (filename && !filename.includes('Папка пуста')) {
                    const option = document.createElement('option');
                    option.value = filename;
                    option.textContent = filename;
                    select.appendChild(option);
                }
            });
        });

    document.getElementById('shareForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const filename = document.getElementById('filename').value;
        const ttl = document.getElementById('ttl').value;
        
        fetch(`/share/create?file=${encodeURIComponent(filename)}&ttl=${ttl}`, {
            method: 'POST'
        })
        .then(r => r.json())
        .then(data => {
            document.getElementById('shareLink').href = data.shareUrl;
            document.getElementById('shareLink').textContent = window.location.origin + data.shareUrl;
            document.getElementById('shareToken').textContent = data.token;
            document.getElementById('expiry').textContent = data.expiresAt || 'Бессрочно';
            document.getElementById('result').style.display = 'block';
        })
        .catch(err => {
            alert('Ошибка: ' + err.message);
        });
    });
});
</script>
