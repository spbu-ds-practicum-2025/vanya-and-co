<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Облачное хранилище</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .auth-container { 
            max-width: 450px;
            width: 100%;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h1 { 
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .auth-buttons { 
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .auth-btn { 
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-align: center;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .auth-btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        .auth-btn.register { 
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }
        
        .auth-btn.register:hover { 
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.6);
        }
        
        .error { 
            color: #f44336;
            margin: 0 0 20px 0;
            padding: 12px;
            background: #ffebee;
            border-radius: 8px;
            border-left: 4px solid #f44336;
            font-size: 14px;
            animation: shake 0.5s;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .icon {
            font-size: 48px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .footer {
            margin-top: 30px;
            text-align: center;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="icon">☁️</div>
        <h1>Облачное хранилище</h1>
        <p class="subtitle">Безопасное хранение и обмен файлами</p>
        
        <div id="error-message" class="error" style="display: none;"></div>
        
        <div class="auth-buttons">
            <a href="/static/register-form.html" class="auth-btn register">
                📝 Регистрация
            </a>
            <a href="/static/login-form.html" class="auth-btn">
                🔐 Вход в систему
            </a>
        </div>
        
        <div class="footer">
            Vanya-and-Co Cloud Storage © 2025
        </div>
    </div>

    <script>
        // Проверяем, авторизован ли пользователь
        function getCookie(name) {
            const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            return match ? match[2] : null;
        }

        // Если пользователь уже авторизован, перенаправляем на главную страницу приложения
        document.addEventListener('DOMContentLoaded', function() {
            const token = getCookie('session');
            if (token) {
                window.location.href = '/files/list';
            }
            
            // Проверяем наличие ошибки в URL
            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error');
            if (error) {
                document.getElementById('error-message').textContent = decodeURIComponent(error);
                document.getElementById('error-message').style.display = 'block';
            }
        });
    </script>
</body>
</html>
