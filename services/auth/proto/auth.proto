syntax = "proto3";

package authpb;

option go_package = "github.com/spbu-ds-practicum-2025/vanya-and-co/services/auth/authpb";

service Auth {
    rpc WhoAmI (WhoAmIRequest) returns (WhoAmIResponse) {}
    rpc Login (LoginRequest) returns (LoginResponse) {}
}

message WhoAmIRequest {
    string token = 1;
}

message WhoAmIResponse {
    string username = 1;
}

message LoginRequest {
    string username = 1;
    string password = 2;
}

message LoginResponse {
    string token = 1;
    string message = 2;
}