services:
  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    ports:
      - "5100:5100" # HTTP
      - "5101:5101" # gRPC
    environment:
      - HTTP_PORT=5100
      - GRPC_PORT=5101
      - DB_PATH=/app/services/auth/data/auth.db
      - GOPROXY=https://goproxy.io,direct
    volumes:
      - ./services/auth/data:/app/services/auth/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5100/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  file:
    build:
      context: .
      dockerfile: services/file/Dockerfile
    ports:
      - "5200:5200"
    environment:
      - GRPC_PORT=5200
      - STORAGE_PATH=/app/storage
      - DB_PATH=/app/services/file/data/file.db
      - GOPROXY=https://goproxy.io,direct
    volumes:
      - ./services/file/storage:/app/storage
      - ./services/file/data:/app/services/file/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "sh", "-c", "nc -z localhost 5200 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  sharing:
    build:
      context: .
      dockerfile: services/sharing/Dockerfile
    ports:
      - "5300:5300"
    environment:
      - GRPC_PORT=5300
      - DB_PATH=/app/services/sharing/data/sharing.db
      - GOPROXY=https://goproxy.io,direct
    volumes:
      - ./services/sharing/data:/app/services/sharing/data
    restart: unless-stopped
    depends_on:
      file:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "sh", "-c", "nc -z localhost 5300 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - AUTH_GRPC_ADDR=auth:5101
      - AUTH_HTTP_ADDR=auth:5100
      - FILE_ADDR=file:5200
      - SHARE_ADDR=sharing:5300
      - GOPROXY=https://goproxy.io,direct
    restart: unless-stopped
    depends_on:
      auth:
        condition: service_healthy
      file:
        condition: service_healthy
      sharing:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  auth_data:
  file_storage:
  file_data:
  sharing_data:
