version: '3.8'
services:
  auth:
    build:
      context: .
      dockerfile: ./services/auth/Dockerfile
    ports:
      - "8081:8081" # http
    environment:
      - PORT=8081

  file:
    build:
      context: .
      dockerfile: ./services/file/Dockerfile
    ports:
      - "8082:8082"
    environment:
      - PORT=8082

  sharing:
    build:
      context: .
      dockerfile: ./services/sharing/Dockerfile
    ports:
      - "8083:8083"
    environment:
      - PORT=8083

  gateway:
    build:
      context: .
      dockerfile: ./services/gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - AUTH_ADDR=http://auth:8081
      - AUTH_GRPC_ADDR=auth:8081
      - FILE_ADDR=http://file:8082
      - SHARE_ADDR=http://sharing:8083
